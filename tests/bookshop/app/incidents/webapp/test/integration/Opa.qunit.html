<!doctype html>
<html lang="en">
	<head>
		<title>OPA5 for Change Tracking</title>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<script
			id="sap-ui-bootstrap"
			src="https://ui5.sap.com/resources/sap-ui-core.js"
			data-sap-ui-theme="sap_horizon"
			data-sap-ui-resourceroots='{
        "ns.incidents": "../../"
      }'
			data-sap-ui-animation="false"
			data-sap-ui-compatVersion="edge"
			data-sap-ui-async="true"
			data-sap-ui-libs="sap.m, sap.fe.core"
		></script>

		<link rel="stylesheet" type="text/css" href="https://ui5.sap.com/resources/sap/ui/thirdparty/qunit-2.css" />

		<script src="https://ui5.sap.com/resources/sap/ui/thirdparty/qunit-2.js"></script>
		<script src="https://ui5.sap.com/resources/sap/ui/qunit/qunit-junit.js"></script>

		<!-- Suppress cross-origin "Script error." from UI5 loaded via CDN.
         QUnit 2.3.2 (bundled with UI5) uses QUnit.onError as the sole
         entry point for window.onerror — returning true suppresses the
         failing assertion that would otherwise be pushed onto the
         current test. -->
		<script>
			(function () {
				var fnOrigOnError = QUnit.onError;
				QUnit.onError = function (error) {
					if (error && error.message === 'Script error.') {
						return true;
					}
					return fnOrigOnError.apply(this, arguments);
				};
			})();
		</script>

		<script src="Opa.qunit.js"></script>
	</head>
	<body>
		<div id="qunit"></div>
		<div id="qunit-fixture"></div>
	</body>
</html>
