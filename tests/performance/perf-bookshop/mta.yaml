_schema-version: 3.3.0
ID: perf-bookshop
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm unlink @cap-js/change-tracking
        - npm pack ../../../
        - sh -c 'TGZ_FILE="$(ls -1 | grep -E "^cap-js-change-tracking.*\.tgz$" | head -n 1)" && npm install "./${TGZ_FILE}"'
        - npm ci
        - npx -p @sap/cds-dk cds build --production
        - sh -c 'cp "$(ls -1 | grep -E "^cap-js-change-tracking.*\.tgz$" | head -n 1)" ./gen/srv'
modules:
  - name: perf-bookshop-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: perf-bookshop-auth
      - name: perf-bookshop-db
      - name: perf-bookshop-logging

  - name: perf-bookshop-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: perf-bookshop-db
      - name: perf-bookshop-logging

resources:
  - name: perf-bookshop-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: perf-bookshop-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
  - name: perf-bookshop-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: perf-bookshop-logging
    type: org.cloudfoundry.managed-service
    parameters:
      service: application-logs
      service-plan: lite
