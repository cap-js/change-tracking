name: OPA tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-opa:
    runs-on: ubuntu-latest
    name: OPA Tests on CAP ${{ matrix.cds-version }}
    strategy:
      fail-fast: false
      matrix:
        cds-version: [latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x
      - run: npm i -g @sap/cds-dk@${{ matrix.cds-version }}
      - run: npm i
      - name: Run OPA tests
        run: cd tests/bookshop && npm run test:opa
      - name: Upload OPA test reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: opa-test-report-${{ matrix.cds-version }}
          path: tests/bookshop/report/
