name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request_target:
    branches: [main]
    types: [reopened, synchronize, opened]

permissions:
  contents: read

jobs:
  requires-approval:
    runs-on: ubuntu-latest
    name: Waiting for PR approval as this workflow runs on pull_request_target
    if: github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.owner.login != 'cap-js'
    environment: pr-approval
    steps:
      - name: Approval Step
        run: echo "This job has been approved!"

  test-sqlite:
    runs-on: ubuntu-latest
    needs: requires-approval
    if: always() && (needs.requires-approval.result == 'success' || needs.requires-approval.result == 'skipped')
    name: SQLite Tests with Node.js ${{ matrix.node-version }} and CAP ${{ matrix.cds-version }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]
        cds-version: [9, latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Pin CDS 9 compatible stack
        if: matrix.cds-version == '9'
        run: |
          npm pkg set "overrides.@cap-js/sqlite=^2"
          npm pkg set "overrides.@sap/cds-mtxs=^3"
          npm pkg set "devDependencies.@sap/cds=^9"
          npm pkg set --workspace=tests/bookshop "dependencies.@sap/cds=^9"
          npm pkg set --workspace=tests/bookshop-mtx "dependencies.@sap/cds=^9"
      - run: npm i -g @sap/cds-dk@${{ matrix.cds-version }}
      - run: npm i
      - run: cd tests/bookshop && npm i
      - run: cd tests/bookshop-mtx && npm i
      - run: cds v -i
      - name: Run SQLite tests
        run: npm run test

  test-postgres:
    runs-on: ubuntu-latest
    needs: requires-approval
    if: always() && (needs.requires-approval.result == 'success' || needs.requires-approval.result == 'skipped')
    name: PostgreSQL Tests with Node.js ${{ matrix.node-version }} and CDS ${{ matrix.cds-version }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]
        cds-version: [9, latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Start PostgreSQL
        run: docker compose -f tests/bookshop/pg-stack.yml up -d --wait
      - name: Pin CDS 9 compatible stack
        if: matrix.cds-version == '9'
        run: |
          npm pkg set "overrides.@cap-js/postgres=^2"
          npm pkg set "overrides.@sap/cds-mtxs=^3"
          npm pkg set "devDependencies.@sap/cds=^9"
          npm pkg set --workspace=tests/bookshop "dependencies.@sap/cds=^9"
      - run: npm i -g @sap/cds-dk@${{ matrix.cds-version }}
      - run: npm i
      - run: cds v -i
      - name: Deploy to PostgreSQL
        run: cd tests/bookshop && npm run deploy:pg
      - name: Run PostgreSQL tests
        run: CDS_ENV=pg npx jest --silent

  test-hana:
    runs-on: ubuntu-latest
    needs: requires-approval
    if: always() && (needs.requires-approval.result == 'success' || needs.requires-approval.result == 'skipped')
    name: HANA Integration Tests with Node.js ${{ matrix.node-version }} and CDS ${{ matrix.cds-version }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]
        cds-version: [9, latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Run HANA integration tests
        uses: ./.github/actions/integration-tests
        with:
          CF_API: ${{ secrets['CF_API'] }}
          CF_USERNAME: ${{ secrets['CF_USERNAME'] }}
          CF_PASSWORD: ${{ secrets['CF_PASSWORD'] }}
          CF_ORG: ${{ secrets['CF_ORG'] }}
          CF_SPACE: ${{ secrets['CF_SPACE'] }}
          NODE_VERSION: ${{ matrix.node-version }}
          CDS_VERSION: ${{ matrix.cds-version }}
