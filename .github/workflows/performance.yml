name: Performance tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request_target:
    branches: [main]
    types: [reopened, synchronize, opened]

permissions:
  contents: read

jobs:
  requires-approval:
    runs-on: ubuntu-latest
    name: Waiting for PR approval as this workflow runs on pull_request_target
    if: github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.owner.login != 'cap-js'
    environment: pr-approval
    steps:
      - name: Approval Step
        run: echo "This job has been approved!"
  perf-tests:
    runs-on: ubuntu-latest
    needs: requires-approval
    if: always() && (needs.requires-approval.result == 'success' || needs.requires-approval.result == 'skipped')
    concurrency:
      group: performance-tests
    name: Performance tests for ${{ matrix.node-version }} and CAP ${{ matrix.cds-version }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x]
        cds-version: [latest, 8]
    steps:

      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Use Node.js ${{ matrix.node-version}}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies and Cloud Foundry CLI (v8.9.0)
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libc6 wget tar
          wget "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=8.9.0&source=github-rel" -O cf-cli.tar.gz
          tar -xvzf cf-cli.tar.gz
          sudo mv cf /usr/local/bin/
          sudo mv cf8 /usr/local/bin/
          cf --version
          cf install-plugin multiapps -f

      - name: Install MTA Build Tool
        shell: bash
        run: npm i -g mbt

      - name: Authenticate with Cloud Foundry
        shell: bash
        run: |
          for i in {1..3}; do
            cf login -a ${{ secrets['CF_API'] }} -u ${{ secrets['CF_USERNAME'] }} -p ${{ secrets['CF_PASSWORD'] }} -o ${{ secrets['CF_ORG'] }} -s ${{ secrets['CF_SPACE'] }} && break
            echo "cf login failed, retrying ($i/3)..."
            sleep 10
            if [ "$i" -eq 3 ]; then
              echo "❌ cf login failed after 3 attempts."
              exit 1
            fi
          done

      - name: Set CDS version-specific dependencies
        shell: bash
        run: |
          if [ "${{ matrix.cds-version }}" == "8" ]; then
            echo "Installing CDS 8 compatible packages..."
            # Add @sap/cds as direct devDependency to anchor the version
            # This prevents npm from resolving to v9 due to open-ended peer deps like ">=8"
            npm pkg set "devDependencies.@sap/cds=^8.9.8"
            npm pkg set "devDependencies.@cap-js/sqlite=^1"
            # Root overrides enforce versions across the entire workspace
            npm pkg set "overrides.@cap-js/sqlite=^1"
            npm pkg set "overrides.@cap-js/hana=^1"
            npm pkg set "overrides.@cap-js/db-service=^1"
            npm pkg set "overrides.@cap-js/postgres=^1"
            npm pkg set "overrides.@sap/cds-mtxs=^2"
            npm pkg set "overrides.@sap/cds-dk=^8"
            npm pkg set "devDependencies.@cap-js/cds-types=^0.11"
            # Update workspace package dependencies to CDS 8 compatible versions
            cd ./tests/performance/perf-bookshop
            npm pkg set "dependencies.@sap/cds=^8.9.8"
            npm pkg set "devDependencies.@sap/cds-dk=^8.9.16"
            npm pkg set "dependencies.@cap-js/hana=^1"
            npm pkg set "dependencies.@cap-js/postgres=^1"
            npm pkg set "devDependencies.@cap-js/sqlite=^1"
            # CDS v8 does not auto-infer db kind from @cap-js/hana plugin, set explicitly
            npm pkg set "cds.requires.db.kind=hana"
          fi

      - name: Install global CDS
        shell: bash
        run: npm i -g @sap/cds-dk@${{ matrix.cds-version }}
      - name: Install all dependencies
        shell: bash
        run: npm install
        
      - name: Package change tracking
        shell: bash
        run: cd ./tests/performance/perf-bookshop && npm pack ../../../
      - name: Install branch
        shell: bash
        run: cd ./tests/performance/perf-bookshop && TGZ_FILE="$(ls -1 | grep -E '^cap-js-change-tracking.*\.tgz$' | head -n1)" && npm i "$TGZ_FILE"

      - name: Set node env for HANA
        run: echo "NODE_VERSION_HANA=$(echo ${{ matrix.node-version }} | tr . _)" >> $GITHUB_ENV
        shell: bash
      - name: Set node env for CDS
        run: echo "CDS_VERSION=$(echo ${{ matrix.cds-version }} | tr . _)" >> $GITHUB_ENV
        shell: bash
      - name: CDS Versions being used
        run: cds v -i
        shell: bash

      - name: Deploy application
        shell: bash
        run: cd ./tests/performance/perf-bookshop && cds up


      # Install kubectl, add kubeconf, modify test config file, run test
      - uses: azure/setup-kubectl@v4
        id: install
      - name: pull kubeconfig
        env:
          PERF_CLUSTER_KUBECONF: ${{ secrets.PERF_CLUSTER_KUBECONF }}
        shell: bash
        run: |
          mkdir kubeconf
          echo "$PERF_CLUSTER_KUBECONF" > kubeconf/kubeconf.conf
      - name: envsub kube.conf
        shell: bash
        run: |
          cat kubeconf/kubeconf.conf | envsubst > populated_kube.conf
        env:
          PERF_SERVICE_USER_TOKEN: ${{ secrets.PERF_SERVICE_USER_TOKEN }}
      - name: export KUBECONFIG path
        shell: bash
        run: echo "KUBECONFIG=populated_kube.conf" >> $GITHUB_ENV
      
      - name: Set PERF_TEST_RUN_NAME
        shell: bash
        run: echo "PERF_TEST_RUN_NAME=$(echo ${{ github.run_id }}-${{ github.run_number }}-${{ github.run_attempt }}-${{ matrix.cds-version }} | tr . -)" >> $GITHUB_ENV

      - name: Populate test configuration
        run: |
          cat ./tests/performance/performance-tests.template.yaml | envsubst '$PERF_ACCOUNT_NAME $PERF_HOST $PERF_HANA_SECRET $PERF_RUNTIME_SECRET $PERF_HANA_SCHEMA $PERF_TEST_RUN_NAME' > performance-tests.yaml
        env:
          PERF_ACCOUNT_NAME: ${{ secrets.PERF_ACCOUNT_NAME }}
          PERF_HOST: ${{ secrets.PERF_HOST }}
          PERF_HANA_SECRET: ${{ secrets.PERF_HANA_SECRET }}
          PERF_RUNTIME_SECRET: ${{ secrets.PERF_RUNTIME_SECRET }}
          PERF_HANA_SCHEMA: ${{ secrets.PERF_HANA_SCHEMA }}
          PERF_TEST_RUN_NAME: ${{ env.PERF_TEST_RUN_NAME }}
      - name: Create performance test run
        shell: bash
        run: kubectl create -f ./performance-tests.yaml
      - name: Wait for test to finish
        shell: bash
        run: |
          for i in {1..15}; do
            STATUS="$(kubectl get testruns "$PERF_TEST_RUN_NAME" -o json | jq -r '.status.state // empty')"
            THRESHOLD_STATUS="$(kubectl get testruns "$PERF_TEST_RUN_NAME" -o json | jq -r '.status.phases[0].status // empty')"
            echo "Current test status (attempt $i/15): ${STATUS:-<empty>}"

            if [ "$STATUS" = "Succeeded" ] && [ "$THRESHOLD_STATUS" = "Completed" ]; then
              echo "Performance tests succeeded."
              kubectl get testruns "$PERF_TEST_RUN_NAME" -o json | jq '.status'
              exit 0
            fi

            if [ "$STATUS" = "Failed" ]; then
              echo "❌ Performance tests failed."
              kubectl get testruns "$PERF_TEST_RUN_NAME" -o json | jq '.status'
              exit 1
            fi

            if [ "$i" -eq 15 ]; then
              echo "❌ performance tests did not reach 'Succeeded' after 15 attempts."
              kubectl get testruns "$PERF_TEST_RUN_NAME" -o json | jq '.status'
              exit 1
            fi

            sleep 60
          done
